  <text x="425" y="222" text-anchor="middle" font-size="12" font-weight="500" fill="#064e3b">Dashboards</text>
  <text x="425" y="238" text-anchor="middle" font-size="10" fill="#065f46">Security Overview</text>

  <!-- Alerts -->
  <rect x="510" y="204" width="120" height="44" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
  <text x="570" y="222" text-anchor="middle" font-size="12" font-weight="500" fill="#92400e">Alerts</text>
  <text x="570" y="238" text-anchor="middle" font-size="10" fill="#b45309">Brute Force · Lockout</text>

  <!-- SOC Analyst -->
  <rect x="360" y="264" width="270" height="44" rx="8" fill="#059669" stroke="#047857" stroke-width="1"/>
  <text x="495" y="282" text-anchor="middle" font-size="12" font-weight="500" fill="#ffffff">SOC Analyst</text>
  <text x="495" y="298" text-anchor="middle" font-size="10" fill="#d1fae5">Investigates · Hunts · Responds</text>

  <!-- Legend -->
  <rect x="30" y="340" width="620" height="60" rx="10" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.8"/>
  <rect x="50" y="358" width="14" height="14" rx="3" fill="#7c3aed"/>
  <text x="70" y="370" font-size="11" fill="var(--color-text-secondary)">Endpoint / Forwarder</text>
  <rect x="200" y="358" width="14" height="14" rx="3" fill="#059669"/>
  <text x="220" y="370" font-size="11" fill="var(--color-text-secondary)">Splunk Server Components</text>
  <rect x="400" y="358" width="14" height="14" rx="3" fill="#d97706"/>
  <text x="420" y="370" font-size="11" fill="var(--color-text-secondary)">Alerting</text>
  <text x="340" y="390" text-anchor="middle" font-size="11" fill="var(--color-text-tertiary)">Forwarder uses minimal CPU/RAM · Does not index data locally · Forwards over encrypted TCP 9997</text>
</svg>